name: Trigger2
on:
  workflow_dispatch:

jobs:
  run-python:
    runs-on: windows-latest

    steps:
    # ==========================
    # 1. Checkout Repo A
    # ==========================
    - name: Checkout Repo A
      uses: actions/checkout@v4

    - name: List files in Repo A
      shell: pwsh
      run: |
        echo "===== Files in Repo A ====="
        Get-ChildItem -Recurse -Force

      

    # ==========================
    # 2. Checkout Repo B into subfolder
    # ==========================
    - name: Checkout Repo B (output repo)
      uses: actions/checkout@v4
      with:
        #repository: ${{ secrets.REPO_B_USERNAME }}/${{ secrets.REPO_B_NAME }}
        repository: SJCoding0130/story
        token: ${{ secrets.OTHER_REPO_TOKEN }}
        path: repo_b
        fetch-depth: 1       # shallow clone
        sparse-checkout: |
          asset_metadata.json
          view.php
          downloaded_titles/
          extracted/
        #sparse-checkout-cone-mode: false
          
    - name: List files in Repo B
      shell: pwsh
      run: |
        echo "===== Files in Repo B ====="
        Get-ChildItem -Recurse -Force
    # ==========================
    # 3. Set up Python
    # ==========================
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install -U pip
        php -v
        pip install requests
        pip install UnityPy
        
        # 4. Setup PHP
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: "8.2"
        coverage: none        
        

    # ==========================
    # 4. Run python script
    # ==========================
    - name: Run try.py and test.py
      shell: pwsh
      run: |
        cd repo_b
        python -u ../chapter.py
        python -u ../try.py

    # ==========================
    # 4a. Download Asset Ripper
    # ==========================
    - name: Extract bundles (AssetRipper)
      run: |
          cmd /c "curl.exe -L https://github.com/AssetRipper/AssetRipper/releases/download/0.3.4.0/AssetRipper_win_x64.zip > AssetRipper.zip"
          Expand-Archive -Path AssetRipper.zip -DestinationPath AssetRipper
           $inputFolder = "repo_b/downloaded_titles"
           $outputFolder = "repo_b/extracted"
           if (-Not (Test-Path $outputFolder)) { New-Item -ItemType Directory -Path $outputFolder }
          .\AssetRipper\AssetRipper.exe $inputFolder -o $outputFolder -q
    - name: List files in Repo B2
      shell: pwsh
      run: |
        echo "===== Files in Repo B ====="
        Get-ChildItem -Recurse -Force
        
    - name: Run try.py and test.py
      shell: pwsh
      run: |
        cd repo_b
        python  ../test.py
        python  ../ttt.py

    # ==========================
    # 5. Push repo B updates
    # ==========================
    - name: Push updates to Repo B
      run: |
        cd repo_b
        git sparse-checkout disable
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add -A
        git reset downloaded_assets/
        # git reset json/
        # git add json/common.chapter.json
        git commit -m "Update from Repo A workflow" || echo "No changes"
        git push
      env:
        GITHUB_TOKEN: ${{ secrets.OTHER_REPO_TOKEN }}
